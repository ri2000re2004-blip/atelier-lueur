<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事中</title>

  <style>
    body{
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f7f3ef;
      font-family:"Yu Mincho",serif;
    }

    .box{
      text-align:center;
    }

    .logo{
      width:180px;
      margin-bottom:30px;
    }

    h1{
      font-size:48px;
      color:#8d6744;
      margin-bottom:20px;
    }

    p{
      font-size:20px;
      color:#555;
      line-height:2;
    }

    a{
      display:inline-block;
      margin-top:40px;
      text-decoration:none;
      background:#b79f87;
      color:#fff;
      padding:15px 35px;
      border-radius:40px;
      transition:.3s;
    }

    a:hover{
      background:#8d6744;
      transform:scale(1.08);
    }
  </style>
</head>

<body>

  <div class="box">
    <img src="images/logo.png" alt="atelier Lueur" class="logo">

    <h1>Instagram</h1>

    <p>
      ただいま準備中です。<br>
      公開まで今しばらくお待ちください。
    </p>

    <a href="index.html">TOPへ戻る</a>
  </div>

</body>
</html>
