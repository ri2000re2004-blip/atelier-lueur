<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>RESERVE | atelier Lueur</title>
</head>

<body>

  <header>
    <div class="logo">
      <a href="index.html">
       <img src="images/logo.png">
       <h1>atelier Lueur</h1>
      </a>
    </div>

    <nav>
      <ul>
        <li><a href="index.html#concept">CONCEPT</a></li>
        <li><a href="index.html#style">STYLE</a></li>
        <li><a href="index.html#access">ACCESS</a></li>
        <li><a href="reserve.html" class="reserve-btn">RESERVE</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="reserve-hero">
      <img src="images/reserve-top.png" alt="美容室のイメージ">
    </section>

    <section class="reserve">
      <h2>RESERVE</h2>
      <p class="reserve-lead">
        ご予約・お問い合わせはこちらのフォームよりお願いいたします。
      </p>

      <form class="reserve-form">

        <div class="form-item">
          <label for="name">お名前</label>
          <input type="text" id="name" name="name">
        </div>

        <div class="form-item">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email">
        </div>

        <div class="form-item">
          <label for="tel">電話番号</label>
          <input type="tel" id="tel" name="tel">
        </div>

        <div class="form-item">
          <label for="menu">ご希望メニュー</label>
          <select id="menu" name="menu">
            <option>選択してください</option>
            <option>カット</option>
            <option>カラー</option>
            <option>パーマ</option>
            <option>トリートメント</option>
          </select>
        </div>

        <div class="form-item">
          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="message"></textarea>
        </div>

        <button type="submit">送信する</button>

      </form>
    </section>
  </main>

</body>
</html>
